<!DOCTYPE html>
<html>

<head>
    <title>Motivator</title>

    <meta name="theme-color" content="#000000">
    <style>
        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        #map {
            height: 300px;
            width: 100%;
            margin-top: 10px;
            border-radius: 10px;
        }

        #status {
            margin-top: 10px;
            font-weight: bold;
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background: #f5f5f5;
        }

        .container {
            max-width: 500px;
            margin: auto;
            padding: 16px;
        }

        #place {
            width: 100%;
            max-width: 400px;
            height: 40px;
            font-size: 16px;
        }

        .pac-container {
            font-size: 16px;
            width: 100% !important;
        }

        .pac-item {
            padding: 10px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: #007bff;
            color: white;
            transition: 0.1s;
        }

        button:active {
            opacity: 0.8;
            transform: scale(0.97);
        }

        .arrive-btn {
            background: #28a745;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>場所を選択</h2>
        <input type="text" id="place" placeholder="場所を検索">
        <label>日時を設定</label>
        <input type="datetime-local" id="datetime">
        <button onclick="saveTask()">タスク追加</button>
        <p id="money">罰金合計: 0円</p>
    </div>
    <div id="map"></div>

    <p id="status"></p>

    <div id="taskList"></div>
    <p id="result">ここに座標が表示される</p>
    <h3>履歴</h3>
    <div id="historyList"></div>

    <script>
        let map;
        let marker;
        let selectedLat = null;
        let selectedLng = null;
        let targetDateTime = null;
        let penalty = 300;
        let tasks = JSON.parse(localStorage.getItem("tasks") || "[]");
        let history = JSON.parse(localStorage.getItem("history") || "[]");

        function initMap() {
            const tokyo = { lat: 35.6804, lng: 139.7690 };

            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 14,
                center: tokyo,
            });

            const input = document.getElementById("place");

            const autocomplete = new google.maps.places.Autocomplete(input);

            autocomplete.bindTo("bounds", map);

            autocomplete.addListener("place_changed", () => {
                const place = autocomplete.getPlace();

                if (!place.geometry) {
                    alert("場所が見つかりません");
                    return;
                }

                const location = place.geometry.location;

                selectedLat = location.lat();
                selectedLng = location.lng();

                map.setCenter(location);
                map.setZoom(16);

                if (marker) {
                    marker.setMap(null);
                }

                marker = new google.maps.Marker({
                    position: location,
                    map: map,
                });

                document.getElementById("result").innerText =
                    "選択: " + place.name;
            });

            map.addListener("click", (e) => {
                selectedLat = e.latLng.lat();
                selectedLng = e.latLng.lng();

                document.getElementById("result").innerText =
                    "緯度: " + selectedLat + " / 経度: " + selectedLng;

                localStorage.setItem("lat", selectedLat);
                localStorage.setItem("lng", selectedLng);

                if (marker) {
                    marker.setMap(null);
                }

                marker = new google.maps.Marker({
                    position: { lat: selectedLat, lng: selectedLng },
                    map: map,
                });
            });

            const lat = localStorage.getItem("lat");
            const lng = localStorage.getItem("lng");
            const savedTime = localStorage.getItem("startTime");

            if (lat && lng) {
                selectedLat = parseFloat(lat);
                selectedLng = parseFloat(lng);

                marker = new google.maps.Marker({
                    position: { lat: selectedLat, lng: selectedLng },
                    map: map,
                });
            }

            const savedDateTime = localStorage.getItem("targetDateTime");

            if (savedDateTime) {
                targetDateTime = new Date(savedDateTime);
            }

            const savedMoney = localStorage.getItem("money");

            if (savedMoney) {
                document.getElementById("money").innerText =
                    "罰金合計: " + savedMoney + "円";
            }

        }

        function saveTask() {
            const placeName = document.getElementById("place").value;
            const datetimeInput = document.getElementById("datetime").value;

            if (!placeName || !datetimeInput || selectedLat === null || selectedLng === null) {
                alert("場所と日時をちゃんと設定して");
                return;
            }

            const task = {
                placeName: placeName,
                lat: selectedLat,
                lng: selectedLng,
                targetDateTime: new Date(datetimeInput).toISOString(),
                completed: false,
                penalized: false
            };

            tasks.push(task);

            localStorage.setItem("tasks", JSON.stringify(tasks));

            alert("タスク追加完了");
            renderTasks();
        }

        function searchPlace() {
            const keyword = document.getElementById("place").value;

            if (!keyword) {
                alert("場所を入力してください");
                return;
            }

            const service = new google.maps.places.PlacesService(map);

            const request = {
                query: keyword,
                fields: ["name", "geometry"],
            };

            service.findPlaceFromQuery(request, (results, status) => {
                if (status === google.maps.places.PlacesServiceStatus.OK) {
                    const place = results[0];

                    selectedLat = place.geometry.location.lat();
                    selectedLng = place.geometry.location.lng();

                    map.setCenter(place.geometry.location);

                    if (marker) {
                        marker.setMap(null);
                    }

                    marker = new google.maps.Marker({
                        position: place.geometry.location,
                        map: map,
                    });

                    document.getElementById("result").innerText =
                        "選択: " + place.name;
                } else {
                    alert("場所が見つかりません");
                }
            });
        }

        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;

            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng / 2) * Math.sin(dLng / 2);

            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return R * c;
        }

        function checkTask(index) {
            const task = tasks[index];

            if (task.completed) {
                alert("すでに到着済み");
                return;
            }

            const now = new Date();
            const deadline = new Date(new Date(task.targetDateTime).getTime() + 10 * 60 * 1000);

            if (now > deadline) {
                applyPenalty(task);
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const distance = getDistance(
                        position.coords.latitude,
                        position.coords.longitude,
                        task.lat,
                        task.lng
                    );

                    if (distance <= 150) {
                        task.completed = true;

                        // 👇 追加（今の時刻を保存）
                        task.completedAt = new Date().toISOString();

                        // 👇 historyへ移動
                        history.push(task);

                        // 👇 tasksから削除
                        tasks.splice(index, 1);

                        localStorage.setItem("tasks", JSON.stringify(tasks));
                        localStorage.setItem("history", JSON.stringify(history));

                        alert("到着成功！");
                    } else {
                        alert("範囲外：" + Math.floor(distance) + "m");
                    }

                    localStorage.setItem("tasks", JSON.stringify(tasks));
                    renderTasks();
                },
                () => {
                    alert("位置情報が取得できません");
                }
            );
        }

        function autoCheckTasks() {
            const now = new Date();

            tasks.forEach((task, index) => {

                // すでに完了 or 罰金済みならスキップ
                if (task.completed || task.penalized) return;

                const deadline = new Date(new Date(task.targetDateTime).getTime() + 10 * 60 * 1000);

                if (now > deadline) {
                    applyPenalty(task, index);
                }
            });

            cleanTasks();
        }

        function applyPenalty(task, index) {
            if (task.completed || task.penalized) return;

            let currentMoney = parseInt(localStorage.getItem("money") || "0");
            currentMoney += penalty;

            task.penalized = true;

            task.penalizedAt = new Date().toISOString();

            // 👇 historyへ
            history.push(task);

            // 👇 tasksから削除
            tasks.splice(index, 1);

            localStorage.setItem("money", currentMoney);
            localStorage.setItem("tasks", JSON.stringify(tasks));
            localStorage.setItem("history", JSON.stringify(history));

            alert("罰金 +" + penalty + "円");

            renderTasks();
            renderHistory();
        }

        // function autoCheckDeadline() {
        //     if (!targetDateTime) return;

        //     const now = new Date();
        //     const deadline = new Date(targetDateTime.getTime() + 10 * 60 * 1000);

        //     if (now > deadline) {
        //         applyPenalty();
        //     }
        // }

        // 1秒ごとに監視
        setInterval(autoCheckTasks, 1000);

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js")
                .then(() => console.log("SW登録成功"))
                .catch(err => console.log("SW登録失敗", err));
        }

        function renderTasks() {
            const list = document.getElementById("taskList");
            list.innerHTML = "";

            tasks.forEach((task, index) => {
                const div = document.createElement("div");

                div.style.background = "white";
                div.style.padding = "10px";
                div.style.marginTop = "10px";
                div.style.borderRadius = "10px";

                let statusText = "";

                if (task.completed) {
                    statusText = "✅ 完了";
                } else if (task.penalized) {
                    statusText = "❌ 罰金";
                } else {
                    statusText = "⌛ 未完了";
                }

                div.innerHTML = `
            <p>📍 ${task.placeName}</p>
            <p>⏰ ${new Date(task.targetDateTime).toLocaleString()}</p>
            <button onclick="checkTask(${index})">到着チェック</button>
        `;

                list.appendChild(div);
            });
        }

        function renderHistory() {
            const list = document.getElementById("historyList");
            list.innerHTML = "";

            history.forEach((task) => {
                const div = document.createElement("div");

                let statusText = "";
                let timeText = "";

                if (task.completed) {
                    statusText = "✅ 完了";
                    timeText = new Date(task.completedAt).toLocaleString();
                } else if (task.penalized) {
                    statusText = "❌ 罰金";
                    timeText = new Date(task.penalizedAt).toLocaleString();
                }

                div.style.background = "#eee";
                div.style.padding = "10px";
                div.style.marginTop = "10px";
                div.style.borderRadius = "10px";

                div.innerHTML = `
            <p>📍 ${task.placeName}</p>
            <p>${statusText}</p>
            <p>🕒 ${timeText}</P>
        `;

                list.appendChild(div);
            });
        }

        function cleanTasks() {
            tasks = tasks.filter(task => {
                // 未完了 & 未罰金だけ残す
                return !task.completed && !task.penalized;
            });

            localStorage.setItem("tasks", JSON.stringify(tasks));
            renderTasks();
        }

        renderTasks();
        renderHistory();

    </script>

    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAo6QO92osLVlVVf3wac459XGYtsozjQ6U&libraries=places&callback=initMap"
