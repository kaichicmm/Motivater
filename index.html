<body>

    <div class="container">
        <h2>場所を選択</h2>
        <input type="text" id="place" placeholder="場所を検索">
        <label>日時を設定</label>
        <input type="datetime-local" id="datetime">
        <button onclick="saveTask()">タスク追加</button>
        <p id="unpaid">未払い: 0円</p>
        <button onclick="payPenalty()">
            支払い済みにする
        </button>
    </div>
    <div id="map"></div>

    <button onclick="moveToCurrentLocation()">
        現在地に移動
    </button>

    <p id="status"></p>

    <h3 class="section-title">タスク一覧</h3>
    <div id="taskList"></div>
    <p id="result"></p>

    <h3 class="section-title">履歴</h3>
    <div id="historyList"></div>

    <script>
        let map;
        let marker;
        let selectedLat = null;
        let selectedLng = null;
        let targetDateTime = null;
        let penalty = 300;
        let tasks = JSON.parse(localStorage.getItem("tasks") || "[]");
        let history = JSON.parse(localStorage.getItem("history") || "[]");
        let currentMarker;
        let currentCircle;

        function initMap() {
            const tokyo = { lat: 35.6804, lng: 139.7690 };

            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 14,
                center: tokyo,
            });

            const input = document.getElementById("place");

            const autocomplete = new google.maps.places.Autocomplete(input);

            autocomplete.bindTo("bounds", map);

            autocomplete.addListener("place_changed", () => {
                const place = autocomplete.getPlace();

                if (!place.geometry) {
                    alert("場所が見つかりません");
                    return;
                }

                const location = place.geometry.location;

                selectedLat = location.lat();
                selectedLng = location.lng();

                map.setCenter(location);
                map.setZoom(16);

                if (marker) {
                    marker.setMap(null);
                }

                marker = new google.maps.Marker({
                    position: location,
                    map: map,
                });

                document.getElementById("result").innerText =
                    "選択: " + place.name;
            });

            map.addListener("click", (e) => {
                selectedLat = e.latLng.lat();
                selectedLng = e.latLng.lng();

                document.getElementById("result").innerText =
                    "緯度: " + selectedLat + " / 経度: " + selectedLng;

                localStorage.setItem("lat", selectedLat);
                localStorage.setItem("lng", selectedLng);

                if (marker) {
                    marker.setMap(null);
                }

                marker = new google.maps.Marker({
                    position: { lat: selectedLat, lng: selectedLng },
                    map: map,
                });
            });

            const lat = localStorage.getItem("lat");
            const lng = localStorage.getItem("lng");
            const savedTime = localStorage.getItem("startTime");

            if (lat && lng) {
                selectedLat = parseFloat(lat);
                selectedLng = parseFloat(lng);

                marker = new google.maps.Marker({
                    position: { lat: selectedLat, lng: selectedLng },
                    map: map,
                });
            }

            const savedDateTime = localStorage.getItem("targetDateTime");

            if (savedDateTime) {
                targetDateTime = new Date(savedDateTime);
            }

            const savedMoney = localStorage.getItem("money");

            if (savedMoney) {
                document.getElementById("money").innerText =
                    "罰金合計: " + savedMoney + "円";
            }

            const unpaidAmount = localStorage.getItem("unpaidAmount") || "0";

            document.getElementById("unpaid").innerText =
                "未払い：" + unpaidAmount + "円";

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    showCurrentLocation(
                        position.coords.latitude,
                        position.coords.longitude,
                        position.coords.accuracy
                    );
                },
                () => {
                    console.log("現在地取得できません");
                }
            );
        }

        function saveTask() {

            const unpaidAmount = parseInt(
                localStorage.getItem("unpaidAmount") || "0"
            );

            if (unpaidAmount > 0) {

                alert("未払い罰金を払ってください");

                return;
            }

            const placeName = document.getElementById("place").value;
            const datetimeInput = document.getElementById("datetime").value;

            if (!placeName || !datetimeInput || selectedLat === null || selectedLng === null) {
                alert("場所と日時をちゃんと設定して");
                return;
            }

            const task = {
                placeName: placeName,
                lat: selectedLat,
                lng: selectedLng,
                targetDateTime: new Date(datetimeInput).toISOString(),
                completed: false,
                penalized: false
            };

            addDoc(collection(db, "tasks"), task)
                .then(() => {
                    alert("Firestore保存成功");
                })
                .catch((error) => {
                    cosole.error(error);
                    alert("Firestore保存失敗");
                });
        }

        function searchPlace() {
            const keyword = document.getElementById("place").value;

            if (!keyword) {
                alert("場所を入力してください");
                return;
            }

            const service = new google.maps.places.PlacesService(map);

            const request = {
                query: keyword,
                fields: ["name", "geometry"],
            };

            service.findPlaceFromQuery(request, (results, status) => {
                if (status === google.maps.places.PlacesServiceStatus.OK) {
                    const place = results[0];

                    selectedLat = place.geometry.location.lat();
                    selectedLng = place.geometry.location.lng();

                    map.setCenter(place.geometry.location);

                    if (marker) {
                        marker.setMap(null);
                    }

                    marker = new google.maps.Marker({
                        position: place.geometry.location,
                        map: map,
                    });

                    document.getElementById("result").innerText =
                        "選択: " + place.name;
                } else {
                    alert("場所が見つかりません");
                }
            });
        }

        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;

            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng / 2) * Math.sin(dLng / 2);

            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return R * c;
        }

        function showCurrentLocation(lat, lng, accuracy = 50) {
            const currentLocation = { lat, lng };

            map.setCenter(currentLocation);
            map.setZoom(16);

            // 既存削除
            if (currentMarker) currentMarker.setMap(null);
            if (currentCircle) currentCircle.setMap(null);

            // 青い点
            currentMarker = new google.maps.Marker({
                position: currentLocation,
                map: map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 8,
                    fillColor: "#4285F4",
                    fillOpacity: 1,
                    strokeColor: "white",
                    strokeWeight: 2,
                }
            });

            // 外側の円
            currentCircle = new google.maps.Circle({
                strokeColor: "#4285F4",
                strokeOpacity: 0.3,
                strokeWeight: 1,
                fillColor: "#4285F4",
                fillOpacity: 0.2,
                map: map,
                center: currentLocation,
                radius: accuracy
            });
        }

        function moveToCurrentLocation() {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    showCurrentLocation(
                        position.coords.latitude,
                        position.coords.longitude,
                        position.coords.accuracy
                    );
                },
                () => {
                    alert("位置情報が取得できません");
                }
            );
        }

        function checkTask(index) {
            const task = tasks[index];

            if (task.completed) {
                alert("すでに到着済み");
                return;
            }

            const now = new Date();
            const deadline = new Date(new Date(task.targetDateTime).getTime() + 10 * 60 * 1000);

            if (now > deadline) {
                applyPenalty(task);
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const distance = getDistance(
                        position.coords.latitude,
                        position.coords.longitude,
                        task.lat,
                        task.lng
                    );

                    if (distance <= 150) {
                        task.completed = true;

                        // 👇 追加（今の時刻を保存）
                        task.completedAt = new Date().toISOString();

                        // 👇 historyへ移動
                        history.push(task);

                        // 👇 tasksから削除
                        tasks.splice(index, 1);

                        localStorage.setItem("tasks", JSON.stringify(tasks));
                        localStorage.setItem("history", JSON.stringify(history));

                        alert("到着成功！");
                    } else {
                        alert("範囲外：" + Math.floor(distance) + "m");
                    }

                    localStorage.setItem("tasks", JSON.stringify(tasks));
                    renderTasks();
                },
                () => {
                    alert("位置情報が取得できません");
                }
            );
        }

        function autoCheckTasks() {
            const now = new Date();

            tasks.forEach((task, index) => {

                // すでに完了 or 罰金済みならスキップ
                if (task.completed || task.penalized) return;

                const deadline = new Date(new Date(task.targetDateTime).getTime() + 10 * 60 * 1000);

                if (now > deadline) {
                    applyPenalty(task, index);
                }
            });
        }

        function applyPenalty(task, index) {
            if (task.completed || task.penalized) return;

            let currentMoney = parseInt(localStorage.getItem("money") || "0");
            currentMoney += penalty;

            let unpaidAmount = parseInt(
                localStorage.getItem("unpaidAmount") || "0"
            );

            unpaidAmount += penalty;
            localStorage.setItem("unpaidAmount", unpaidAmount);

            task.penalized = true;

            task.penalizedAt = new Date().toISOString();

            // 👇 historyへ
            history.push(task);

            // 👇 tasksから削除
            tasks.splice(index, 1);

            localStorage.setItem("money", currentMoney);
            localStorage.setItem("tasks", JSON.stringify(tasks));
            localStorage.setItem("history", JSON.stringify(history));

            alert("罰金 +" + penalty + "円");

            renderTasks();
            renderHistory();

            document.getElementById("unpaid").innerText =
                "未払い：" + unpaidAmount + "円";
        }

        // function autoCheckDeadline() {
        //     if (!targetDateTime) return;

        //     const now = new Date();
        //     const deadline = new Date(targetDateTime.getTime() + 10 * 60 * 1000);

        //     if (now > deadline) {
        //         applyPenalty();
        //     }
        // }

        // 1秒ごとに監視
        setInterval(autoCheckTasks, 1000);

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js")
                .then(() => console.log("SW登録成功"))
                .catch(err => console.log("SW登録失敗", err));
        }

        async function loadTasks() {

            const querySnapshot = await getDocs(collection(db, "tasks"));

            tasks = [];

            querySnapshot.forEach((doc) => {

                const taskData = doc.data();

                taskData.id = doc.id;

                tasks.push(taskData);
            });

            renderTasks();
        }

        function renderTasks() {
            const list = document.getElementById("taskList");
            list.innerHTML = "";

            tasks.forEach((task, index) => {

                const div = document.createElement("div");
                div.className = "task-card";

                let statusText = "";
                let statusClass = "";

                if (task.completed) {
                    statusText = "✅ 完了";
                    statusClass = "success";
                } else if (task.penalized) {
                    statusText = "❌ 罰金";
                    statusClass = "penalty";
                } else {
                    statusText = "⌛ 未完了";
                    statusClass = "pending";
                }

                const deadline = new Date(task.targetDateTime);
                const now = new Date();

                const remainMs = deadline - now;

                let remainText = "";

                if (remainMs > 0) {
                    const minutes = Math.floor(remainMs / 1000 / 60);
                    remainText = `あと${minutes}分`;
                } else {
                    remainText = "締切超過";
                }

                div.innerHTML = `
            <div class="task-title">
                📍 ${task.placeName}
            </div>

            <p>⏰ ${new Date(task.targetDateTime).toLocaleString()}</p>

            <p>💰 ${penalty}円</p>

            <p>${remainText}</p>

            <p class="task-status ${statusClass}">
                ${statusText}
            </p>

            <button class="arrive-btn"
                onclick="checkTask(${index})">
                到着チェック
            </button>
        `;

                list.appendChild(div);
            });
        }

        function renderHistory() {

            const list = document.getElementById("historyList");

            list.innerHTML = "";

            history.slice().reverse().forEach((task) => {

                const div = document.createElement("div");

                div.className = "history-card";

                let statusText = "";
                let timeText = "";

                if (task.completed) {
                    statusText = "✅ 完了";
                    timeText = new Date(task.completedAt).toLocaleString();
                } else if (task.penalized) {
                    statusText = "❌ 罰金";
                    timeText = new Date(task.penalizedAt).toLocaleString();
                }

                div.innerHTML = `
            <div class="task-title">
                📍 ${task.placeName}
            </div>

            <p>${statusText}</p>

            <p>🕒 ${timeText}</p>
        `;

                list.appendChild(div);
            });
        }

        function cleanTasks() {
            tasks = tasks.filter(task => {
                // 未完了 & 未罰金だけ残す
                return !task.completed && !task.penalized;
            });

            localStorage.setItem("tasks", JSON.stringify(tasks));
            renderTasks();
        }

        loadTasks();
        renderHistory();

        function payPenalty() {
            localStorage.setItem("unpaidAmount", 0);

            document.getElementById("unpaid").innerText =
                "未払い： 0円";

            alert("支払い完了");
        }

    </script>
